name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: |
          black --version
          ruff check .
          black --required-version 26.5.1 --check .

      - name: Test
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "import os,sys; print('cwd=', os.getcwd()); print('python=', sys.version)"
          python -c "import webapp; print('webapp=', webapp.__file__)"
          python -m pytest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend build tooling
        run: npm ci

      - name: Frontend checks
        run: |
          npm run check:frontend
          npm run build:frontend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: artifacts/frontend

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t premier-predictor:ci .
